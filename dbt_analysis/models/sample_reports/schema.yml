
version: 2

sources:
  - name: raw_sources_1
    schema: public
    database: practice
    description: 'List of all the raw sources'
    tables:
      - name: friends

models:
  - name: exclude_min_max
    description: '{{ doc("activities_events_1") }}'
    tests:
    - dbt_utils.expression_is_true:
       arguments:
        expression: "2+2 = 4"

    columns:
      - name: activity        
        description: "activity"
        data_tests:
          - unique
          - not_null
          - test_is_activity_singing


    config:
      materialized: view
      alias: view_exclude_min_max_activity

  - name: report_all_students_in_department
    description: "report_all_students_in_department"
    columns:
      - name: dept_name        
        description: "dept_name"
        data_tests:
          - unique
          - not_null
    config:
      materialized: view
      alias: view_report_all_students_in_department      


  - name: movie_ratings
    description: '{{ doc("movie_ratings") }}'
    columns:
      - name: moviename        
        description: "moviename"
        data_tests:
          - unique
          - not_null
    config:
      materialized: view
      alias: view_movie_ratings 

  
